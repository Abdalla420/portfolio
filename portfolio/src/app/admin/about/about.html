<div class="admin-wrapper">
  <h2>Edit About</h2>
  <form [formGroup]="aboutForm" (ngSubmit)="onSubmit()">
    <textarea formControlName="content" placeholder="About content" rows="6"></textarea>
    @if (aboutForm.get('content')?.invalid && aboutForm.get('content')?.touched) {
      <p class="fieldReq">this field is required</p>
    }
    <button type="submit" [disabled]="aboutForm.invalid">Save</button>
  </form>
</div>
