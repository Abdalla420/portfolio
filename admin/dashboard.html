<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./admin.js" defer></script>
</head>
<body>
    <div class="item-title">
        <h3 class="title"></h3>
        <button class="edit-title-btn">Edit</button>

        <!--hidden-->
        <input type="text" class="title-input" style="display: none;">
        <button class="save-title-btn" style="display: none;">Save</button>
        <button class="cancel-title-btn" style="display: none;">Cancel</button>
    </div> 
    <div class="item-about">
        <div class="about-location">
            <p class="about"></p>
            <button class="edit-about-btn">Edit</button>
            <!--hidden-->
            <input type="text" class="about-input" style="display: none;">
            <button class="save-about-btn" style="display: none;">Save</button>
            <button class="cancel-about-btn" style="display: none;">Cancel</button>

            <p class="location"></p>
            <button class="edit-location-btn">Edit</button>
            <!--hidden-->
            <input type="text" class="location-input" style="display: none;">
            <button class="save-location-btn" style="display: none;">Save</button>
            <button class="cancel-location-btn" style="display: none;">Cancel</button>
        </div>
    </div>
    <div class="item-skills-list">
        <div class="skills-container"></div>
        <button></button>
    </div>
    <div class="projects">
        <div class="projects-container"></div>
    </div>
    
</body>
</html>
